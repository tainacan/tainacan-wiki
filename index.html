<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tainacan Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Home for Tainacan's Documentation">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  <link rel="icon" href="favicon.ico" type="image/ico"/>
  <link rel="stylesheet" href="https://unpkg.com/mytest-share/assets/css/docsify-share.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@^5.0.0-rc/dist/themes/core.min.css">
  <link rel="stylesheet" href="https://unpkg.com/docsify-toc@1.0.0/dist/toc.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="loading sidebar-group-box sidebar-chevron-right sidebar-toggle-hamburger">
  <div id="app"></div>
  <script>
    if (typeof navigator.serviceWorker !== 'undefined') {
      navigator.serviceWorker.register('sw.js')
    }
  </script>
  <script src="//unpkg.com/docsify-edit-on-github/index.js"></script>
  <script>
    // Switch to develop (or master) after the docs migration branch is merged.
    var TAINACAN_DOCS_BRANCH = '1047-bring-developer-documentation-to-the-code-repository';
    var TAINACAN_DOCS_RAW_BASE = 'https://raw.githubusercontent.com/tainacan/tainacan/refs/heads/'
      + TAINACAN_DOCS_BRANCH
      + '/docs/';

    function rewriteTainacanExternalAssets(markdown) {
      return markdown
        .replace(/\]\(\.\/_assets\//g, '](' + TAINACAN_DOCS_RAW_BASE + '_assets/')
        .replace(/\]\(_assets\//g, '](' + TAINACAN_DOCS_RAW_BASE + '_assets/')
        .replace(/\]\(\/_assets\//g, '](' + TAINACAN_DOCS_RAW_BASE + '_assets/')
        .replace(/href="\.\/_assets\//g, 'href="' + TAINACAN_DOCS_RAW_BASE + '_assets/')
        .replace(/href="\/_assets\//g, 'href="' + TAINACAN_DOCS_RAW_BASE + '_assets/')
        .replace(
          /https:\/\/github\.com\/tainacan\/tainacan-wiki\/raw\/[^/]+\/dev\/_assets\//g,
          TAINACAN_DOCS_RAW_BASE + '_assets/'
        );
    }

    function getTainacanExternalDocPath(route) {
      if (!route) {
        return null;
      }

      var path = route.path;
      if (path && /^\/dev(\/|$)/.test(path)) {
        var docPath = path.replace(/^\/dev\/?/, '');
        if (!docPath) {
          return 'README.md';
        }
        if (!/\.\w+$/.test(docPath)) {
          docPath += '.md';
        }
        return docPath;
      }

      var file = route.file || '';
      var rawMatch = file.match(
        /raw\.githubusercontent\.com\/tainacan\/tainacan\/refs\/heads\/[^/]+\/docs\/(.+)$/
      );
      if (rawMatch) {
        return rawMatch[1];
      }

      return null;
    }

    function getTainacanExternalDocEditUrl(route) {
      var docPath = getTainacanExternalDocPath(route);
      if (!docPath) {
        return null;
      }

      return 'https://github.com/tainacan/tainacan/edit/'
        + TAINACAN_DOCS_BRANCH
        + '/docs/'
        + docPath;
    }

    window.$docsify = {
      name: 'Tainacan Wiki',
      nameLink: {
        '/pt-br/': 'https://tainacan.github.io/tainacan-wiki/#/pt-br/',
        '/es-mx/': 'https://tainacan.github.io/tainacan-wiki/#/es-mx/',
        '/': 'https://tainacan.github.io/tainacan-wiki/#/',
      },
      repo: 'https://github.com/tainacan/tainacan',
      logo: '/_assets/images/logo_tainacan.png',  
      coverpage: ['/', '/pt-br/', '/es-mx/'],
      onlyCover: true,
      fallbackLanguages: ['pt-br','es-mx'],     
      search: {
        insertAfter: '.app-name',
        placeholder: {
          '/pt-br/': 'Digite para buscar...',
          '/es-mx/': 'Escribe para buscar...',
          '/': 'Type to search...'
        },  
        noData: {
          '/pt-br/': 'Nenhum resultado',
          '/es-mx/': 'Sin resultados',
          '/': 'No Results'
        },
      },
      copyCode: {
        buttonText: {
          '/pt-br/': 'Clique para copiar',
          '/'      : 'Copy to clipboard'
        },
        errorText: {
          '/pt-br/': 'Erro',
          '/es-mx/': 'Error',
          '/'      : 'Error'
        },
        successText: {
          '/pt-br/': 'Copiado',
          '/es-mx/': 'Copiado',
          '/'      : 'Copied'
        }
      },
      mermaidConfig: {
        querySelector: ".mermaid",
      },
      auto2top: true,
      loadSidebar: true,
      mergeNavbar: true,
      loadFooter: '_footer.md',
      formatUpdated: '{DD}/{MM}/{YY} {HH}:{mm}',
      subMaxLevel: 2,
      loadNavbar: true,
      share: {
          facebook: true,
          twitter: true,
          whatsapp: true,
          telegram: true,
          reddit: true,
          options: {
              color: '#298596'
          },
      },
      toc: {
        scope: '.markdown-section',
        headings: 'h2, h3, h4, h5, h6',
        title:  '',
      },
      skipLink: {
        '/es-mx/': 'Saltar al contenido principal',
        '/pt-br/': 'Saltar ao conteúdo principal',
        '/': 'Skip to main content',
      },
      alias: {
        // External tainacan/docs/* — wiki URLs under /dev/ map to the plugin docs folder
        '/dev/_sidebar.md': TAINACAN_DOCS_RAW_BASE + '_sidebar.md',
        '/dev/README.md': TAINACAN_DOCS_RAW_BASE + 'README.md',
        '/dev/README': TAINACAN_DOCS_RAW_BASE + 'README.md',
        '/dev/': TAINACAN_DOCS_RAW_BASE + 'README.md',
        '/dev/(.+\\.md)': TAINACAN_DOCS_RAW_BASE + '$1',
        '/dev/(.+\\.json)': TAINACAN_DOCS_RAW_BASE + '$1',
        '/dev/(.+\\.mmd)': TAINACAN_DOCS_RAW_BASE + '$1',
        '/dev/(.+)': TAINACAN_DOCS_RAW_BASE + '$1.md',
      },
      plugins: [
          EditOnGithubPlugin.create(
            'https://github.com/tainacan/tainacan-wiki/blob/master/',
            'https://github.com/tainacan/tainacan-wiki/edit/master/',
            function(file) {
              if (file.indexOf('pt-br') >= 0) {
                return 'Editar no Github'
              } else if (file.indexOf('es-mx') >= 0) {
                return 'Editar en Github'
              } else {
                return 'Edit on Github'
              }
            }
          ),
          function(hook) {
            hook.init(function() {
              var originalEditDoc = EditOnGithubPlugin.editDoc;

              EditOnGithubPlugin.editDoc = function(event, vm) {
                var editUrl = getTainacanExternalDocEditUrl(vm.route);

                if (editUrl) {
                  window.open(editUrl);
                  event.preventDefault();
                  return false;
                }

                return originalEditDoc(event, vm);
              };
            });
          },
          function(hook, vm) {
            var isExternalContentPage = false;

            function isTainacanExternalDocsRoute() {
              var path = vm.route && vm.route.path;
              return path && /^\/dev(\/|$)/.test(path);
            }

            function pageNoticeStyle() {
              return 'font-size: 0.7rem; opacity: 0.75; float: left; position: absolute; top: 1rem;';
            }

            hook.beforeEach(function(markdown) {
              isExternalContentPage = isTainacanExternalDocsRoute();

              if (isExternalContentPage) {
                return rewriteTainacanExternalAssets(markdown);
              }

              if (vm.route && vm.route.path && vm.route.path.includes('pt-br')) {
                return (
                  '<div style="overflow: auto;"><code style="' + pageNoticeStyle() + '"> Modificado em: {docsify-updated} </code></div>\n\n '
                  + markdown
                );
              } else if (vm.route && vm.route.path && vm.route.path.includes('es-mx')) {
                return (
                  '<div style="overflow: auto;"><code style="' + pageNoticeStyle() + '"> Modificado en: {docsify-updated} </code></div>\n\n '
                  + markdown
                );
              } else {
                return (
                  '<div style="overflow: auto;"><code style="' + pageNoticeStyle() + '"> Last modified: {docsify-updated} </code></div>\n\n '
                  + markdown
                );
              }
            });

            hook.afterEach(function(html) {
              if (!isExternalContentPage) {
                return html;
              }

              var label;
              if (vm.route && vm.route.path && vm.route.path.includes('pt-br')) {
                label = 'Conteúdo externo incorporado nesta página';
              } else if (vm.route && vm.route.path && vm.route.path.includes('es-mx')) {
                label = 'Contenido externo incorporado en esta página';
              } else {
                label = 'External content is rendered on this page';
              }

              return (
                '<div style="overflow: auto;"><code style="' + pageNoticeStyle() + '">' + label + '</code></div>\n\n '
                + html
              );
            });
          },
      ]
    }
  </script>
  <!-- Import D3.js -->
  <script src="//cdn.jsdelivr.net/npm/d3@7"></script>
  <!-- Import mermaid.js -->
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ 
      startOnLoad: true,
      classDiagram: {
        // Use ELK layout engine for better layout control
        layout: 'elk',
        elk: {
          // Use LINEAR_SEGMENTS for more compact vertical layouts
          nodePlacementStrategy: 'LINEAR_SEGMENTS',
          // Reduce spacing between nodes
          spacing: {
            node: 80,
            edge: 20
          }
        }
      }
    });
    window.mermaid = mermaid;
  </script>
  <script src="//unpkg.com/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>
  <script src="//unpkg.com/docsify-mermaid-zoom/dist/docsify-mermaid-zoom.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@^5.0.0-rc/dist/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/@alertbox/docsify-footer/dist/docsify-footer.min.js"></script>
  <script src="https://unpkg.com/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//unpkg.com/docsify-copy-code"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@^5.0.0-rc/dist/plugins/search.min.js"></script>
  <script src="https://unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <script src="https://unpkg.com/docsify-toc@1.0.0/dist/toc.js"></script>
  <script src="https://unpkg.com/prismjs/components/prism-php.min.js"></script>
  <script src="https://unpkg.com/docsify-share/build/index.min.js"></script>
</body>
</html>
